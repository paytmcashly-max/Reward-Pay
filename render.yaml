services:
  - type: web
    name: reward-wallet-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install --include=dev
    startCommand: npm run start --workspace @reward-wallet/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OTP_STATE_FILE_PATH
        value: /tmp/reward-wallet-otp-state.json
      - key: ALLOW_DEV_HEADERS
        value: "false"
      - key: ALLOW_MEMORY_INFRASTRUCTURE
        value: "false"
      - key: EXPLICIT_MOCK_PAYMENTS
        value: "false"
      - key: EXPLICIT_MOCK_PAYOUTS
        value: "true"
      - key: ENABLE_INVITE_LOGIN
        value: "true"
      - key: INVITE_CODE
        sync: false
      - key: JWT_TTL_SECONDS
        value: "604800"
      - key: JWT_SECRET
        generateValue: true
      - key: CASHFREE_BASE_URL
        value: https://sandbox.cashfree.com
      - key: CASHFREE_PAYMENT_API_VERSION
        value: 2025-01-01
      - key: CASHFREE_PAYOUT_API_VERSION
        value: 2024-01-01
      - key: CASHFREE_CLIENT_ID
        sync: false
      - key: CASHFREE_CLIENT_SECRET
        sync: false
      - key: CASHFREE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_SUPER_PHONE
        sync: false
      - key: ADMIN_SUPER_PASSWORD
        sync: false
      - key: ADMIN_OPERATOR_PHONE
        sync: false
      - key: ADMIN_OPERATOR_PASSWORD
        sync: false
